name: Full-Scale Fedora Repository Mirror
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    container:
      image: fedora:40
    steps:
      - name: Install System Management Tools
        run: dnf install -y git jq python3

      - name: Checkout Source Repository
        uses: actions/checkout@v4

      - name: Shard Entire Fedora Core Catalog
        run: |
          echo "📥 Synchronizing upstream Fedora repositories..."
          dnf makecache
          
          echo "🔨 Querying complete un-sliced repository metadata..."
          dnf repoquery --repo=fedora --available --qf '{"name": "%{name}", "desc": "%{summary}", "package_name": "%{name}", "version": "%{version}-%{release}"}' > raw_list.json
          
          echo "📝 Creating localized Python engine script..."
          cat << 'EOF' > parse_repo.py
          import json
          import os
          import re
          from collections import defaultdict

          os.makedirs("repo_shards", exist_ok=True)
          
          shards = defaultdict(list)
          seen_packages = set()

          with open("raw_list.json", "r") as f:
              for line in f:
                  line = line.strip()
                  if not line: 
                      continue
                  try:
                      pkg = json.loads(line)
                      name = pkg.get("name", "")
                      desc = pkg.get("desc", "")
                      version = pkg.get("version", "")
                      
                      if not name or not desc: 
                          continue
                      if "-debug" in name or "-static" in name: 
                          continue
                      
                      pkg_key = f"{name}-{version}"
                      if pkg_key in seen_packages: 
                          continue
                      seen_packages.add(pkg_key)
                      
                      first_char = name[0].lower()
                      if not first_char.isalnum():
                          first_char = re.sub(r"^[^a-zA-Z0-9]", "", name)[0].lower()
                      
                      if first_char.isdigit():
                          first_char = "number"
                          folder = "n"
                      else:
                          folder = first_char
                          
                      url = f"https://download-ib01.fedoraproject.org/pub/fedora/linux/releases/40/Everything/x86_64/os/Packages/{folder}/{name}-{version}.x86_64.rpm"
                      
                      shards[first_char].append({
                          "name": name,
                          "desc": desc,
                          "package_name": name,
                          "version": version,
                          "download_url": url
                      })
                  except Exception:
                      continue

          total_count = 0
          summary_manifest = {}
          
          for shard_key, packages in shards.items():
              packages.sort(key=lambda x: x["name"].lower())
              total_count += len(packages)
              summary_manifest[shard_key] = len(packages)
              
              with open(f"repo_shards/{shard_key}.json", "w") as out:
                  json.dump(packages, out, indent=2)
          
          with open("repo_shards/manifest.json", "w") as out:
              json.dump({"total_packages": total_count, "groups": summary_manifest}, out, indent=2)

          print(f"✅ Sharding successful. Total records: {total_count}")
          EOF

          echo "🐍 Running Python Sharding Partition Matrix..."
          python3 parse_repo.py
          
      - name: Push Database Shards to Main Branch
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add repo_shards/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-Sync: Total Fedora Repository Mirror Refreshed" && git push)
