name: Bulk Ingest Fedora App Database
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-matrix:
    runs-on: ubuntu-latest
    container:
      image: fedora:40
    steps:
      - name: Install Fundamental Core Utilities
        run: dnf install -y git jq python3

      - name: Checkout Source Repository
        uses: actions/checkout@v4

      - name: Extract Live Package Meta via Python Data Engine
        run: |
          echo "📥 Synchronizing upstream Fedora repositories..."
          dnf makecache
          
          echo "🔨 Pulling bulk package metadata sets via native DNF repoquery..."
          dnf repoquery --repo=fedora --available --qf '{"name": "%{name}", "desc": "%{summary}", "package_name": "%{name}", "version": "%{version}-%{release}"}' > raw_list.json
          
          echo "🐍 Processing structural compilation via Python Engine..."
          python3 -c '
          import json, os, re

          output_packages = []
          seen_names = set()

          with open("raw_list.json", "r") as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  try:
                      pkg = json.loads(line)
                      name = pkg.get("name", "")
                      desc = pkg.get("desc", "")
                      version = pkg.get("version", "")
                      
                      # Filter out libraries, debug tools, and duplicate entries
                      if not name or not desc: continue
                      if name.startswith("lib") or "-devel" in name or "-debug" in name or "-libs" in name: continue
                      if name in seen_names: continue
                      
                      seen_names.add(name)
                      
                      # Safely determine the mirror folder character alignment
                      first_char = name[0].lower()
                      if not first_char.isalnum():
                          first_char = re.sub(r"^[^a-zA-Z0-9]", "", name)[0].lower()
                      if first_char.isdigit():
                          first_char = "n"
                          
                      url = f"https://download-ib01.fedoraproject.org/pub/fedora/linux/releases/40/Everything/x86_64/os/Packages/{first_char}/{name}-{version}.x86_64.rpm"
                      
                      output_packages.append({
                          "name": name,
                          "desc": desc,
                          "package_name": name,
                          "version": version,
                          "download_url": url
                      })
                  except Exception:
                      continue # Silently drop malformed raw lines to ensure stability

          # Sort by name and take a clean slice of up to 1000 items
          output_packages.sort(key=lambda x: x["name"])
          final_set = output_packages[:1000]

          with open("fedora_packages.json", "w") as out:
              json.dump(final_set, out, indent=2)
          '
          
          echo "✅ Pipeline successfully processed. Total packages extracted:"
          jq 'length' fedora_packages.json

      - name: Push Bulk Matrix to Repository
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add fedora_packages.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-Sync: Bulk DNF AppStream Database Exported" && git push)
